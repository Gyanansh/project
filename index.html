<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrustPay AI - Final Boss</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}
html{scroll-behavior:smooth;}
body{background:#0f172a;color:white;cursor:none;}

/* Cursor */
.cursor{
 width:20px;height:20px;border:2px solid #38bdf8;
 border-radius:50%;position:fixed;pointer-events:none;
 transform:translate(-50%,-50%);z-index:999;
}
.cursor-grow{transform:scale(2);background:rgba(56,189,248,0.3);}

/* Glow */
.glow{
 position:fixed;width:300px;height:300px;background:#38bdf8;
 filter:blur(120px);opacity:0.2;z-index:-1;
}
.glow1{top:10%;left:10%;}
.glow2{bottom:10%;right:10%;}

/* Header */
header{
 display:flex;justify-content:space-between;
 padding:20px 50px;background:rgba(255,255,255,0.05);
 position:sticky;top:0;
}
.logo{color:#38bdf8;font-weight:bold;font-size:22px;}
nav a{margin:0 10px;color:white;text-decoration:none;}
nav a:hover{color:#38bdf8;}

/* Hero */
.hero{
 height:90vh;
 background:url('https://images.unsplash.com/photo-1601597111158-2fceff292cdc') center/cover;
 display:flex;align-items:center;justify-content:center;
 text-align:center;position:relative;
}
.hero::after{
 content:"";position:absolute;width:100%;height:100%;
 background:rgba(15,23,42,0.8);
}
.hero div{position:relative;z-index:1;}

button{
 padding:12px 25px;background:#38bdf8;border:none;
 border-radius:8px;margin:5px;
}

/* Sections */
section{padding:60px 20px;text-align:center;}

.cards{
 display:flex;justify-content:center;gap:20px;flex-wrap:wrap;
}
.card{
 background:rgba(255,255,255,0.05);
 padding:20px;border-radius:15px;width:250px;
 transition:0.4s;
}
.card:hover{
 transform:translateY(-12px) scale(1.05);
 box-shadow:0 0 25px rgba(56,189,248,0.6);
}
.card img{width:60px;}

/* Dashboard */
.dashboard{
 background:#020617;padding:30px;border-radius:15px;
 max-width:500px;margin:auto;
}

/* Form */
form{
 max-width:400px;margin:auto;display:flex;
 flex-direction:column;gap:10px;
}
input,textarea{
 padding:10px;border-radius:8px;border:none;
}

/* Animation */
.hidden{opacity:0;transform:translateY(40px);transition:0.8s;}
.show{opacity:1;transform:translateY(0);}
</style>
</head>

<body>

<div class="cursor"></div>
<div class="glow glow1"></div>
<div class="glow glow2"></div>

<header>
<div class="logo">TrustPay AI</div>
<nav>
<a href="#home">Home</a>
<a href="#features">Features</a>
<a href="#dashboard">Dashboard</a>
<a href="#contact">Contact</a>
</nav>
</header>

<!-- HERO -->
<section id="home" class="hero">
<div>
<h1>Secure Digital Payments</h1>
<p>Trusted by 10,000+ rural users 🛡️</p>
<button onclick="showAlert()">Get Started</button>
<button onclick="startVoice()">🎤 Talk to AI</button>
<p id="voiceOutput"></p>
</div>
</section>

<!-- FEATURES -->
<section id="features" class="hidden">
<h2>Features</h2>
<div class="cards">
<div class="card"><img src="https://img.icons8.com/fluency/96/security-checked.png"><h3>Fraud Detection</h3></div>
<div class="card"><img src="https://img.icons8.com/fluency/96/microphone.png"><h3>Voice AI</h3></div>
<div class="card"><img src="https://img.icons8.com/fluency/96/combo-chart.png"><h3>Dashboard</h3></div>
</div>
</section>

<!-- DASHBOARD -->
<section id="dashboard" class="hidden">
<h2>Live AI Monitoring</h2>
<div class="dashboard">
<p id="fraudStatus">Checking transactions...</p>
<p>Recent Activity:</p>
<ul id="transactions"></ul>
</div>
</section>

<!-- CONTACT -->
<section id="contact" class="hidden">
<h2>Contact</h2>
<form onsubmit="submitForm(event)">
<input placeholder="Name" required>
<input placeholder="Email" required>
<textarea placeholder="Message"></textarea>
<button>Send</button>
</form>
</section>

<footer><p>© 2026 TrustPay AI</p></footer>

<script>
/* Cursor */
const cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",e=>{
 cursor.style.top=e.clientY+"px";
 cursor.style.left=e.clientX+"px";
});
document.querySelectorAll("a,button").forEach(el=>{
 el.onmouseenter=()=>cursor.classList.add("cursor-grow");
 el.onmouseleave=()=>cursor.classList.remove("cursor-grow");
});

/* Scroll */
const obs=new IntersectionObserver(entries=>{
 entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add("show");});
});
document.querySelectorAll(".hidden").forEach(el=>obs.observe(el));

/* Voice */
function startVoice(){
 const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
 rec.lang="en-IN";
 rec.start();
 rec.onresult=e=>{
  const t=e.results[0][0].transcript;
  voiceOutput.innerText="You said: "+t;
  speak("Your account is secure");
 };
}
function speak(msg){
 speechSynthesis.speak(new SpeechSynthesisUtterance(msg));
}

/* Fraud Simulation */
setInterval(()=>{
 const msgs=[
 "✅ Safe transaction",
 "⚠️ Suspicious login detected",
 "🛡️ AI protection active"
 ];
 fraudStatus.innerText=msgs[Math.floor(Math.random()*msgs.length)];
},3000);

/* Fake Transactions */
setInterval(()=>{
 const tx=[
 "₹200 sent to Shop",
 "₹500 received",
 "₹999 payment attempt blocked"
 ];
 const li=document.createElement("li");
 li.innerText=tx[Math.floor(Math.random()*tx.length)];
 document.getElementById("transactions").prepend(li);
},4000);

/* Popup */
setTimeout(()=>{
 alert("⚠️ Scam Blocked by AI!");
},7000);

function showAlert(){alert("Welcome 🚀");}
function submitForm(e){e.preventDefault();alert("Message Sent");}
</script>

</body>
</html>
